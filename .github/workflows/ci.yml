name: CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: aiecho

jobs:
  # Rust CI
  rust:
    name: Rust CI
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Check formatting
        working-directory: ./rust
        run: cargo fmt --check --all
      
      - name: Clippy
        working-directory: ./rust
        run: cargo clippy -- -D warnings
        
      - name: Build
        working-directory: ./rust
        run: cargo build --verbose
        
      - name: Run tests
        working-directory: ./rust
        run: cargo test --verbose

  # Build release binaries
  build:
    name: Build Release
    needs: rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
        
      - name: Build release
        working-directory: ./rust
        run: cargo build --release --locked --target ${{ matrix.target }}
        
      - name: Verify binary exists
        shell: bash
        working-directory: ./rust
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN_PATH="target/${{ matrix.target }}/release/${{ env.BIN_NAME }}.exe"
          else
            BIN_PATH="target/${{ matrix.target }}/release/${{ env.BIN_NAME }}"
          fi
          if [[ ! -f "$BIN_PATH" ]]; then
            echo "Binary not found at: $BIN_PATH"
            ls -la target/${{ matrix.target }}/release/
            exit 1
          fi
          echo "Binary found: $BIN_PATH"

      - name: Package
        shell: bash
        working-directory: ./rust
        run: |
          cd target/${{ matrix.target }}/release
          EXT="${{ matrix.ext }}"
          
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            powershell -Command "Compress-Archive -Path aiecho.exe -DestinationPath ../../../aiecho-${{ github.ref_name }}-${{ matrix.target }}.${EXT}"
          else
            tar czvf ../../../aiecho-${{ github.ref_name }}-${{ matrix.target }}.${EXT} ./aiecho
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: rust/${{ env.BIN_NAME }}-*${{ matrix.ext }}

  # Release
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ${{ env.BIN_NAME }}-*

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f -name "*.zip" -o -name "*.tar.gz" | xargs sha256sum > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

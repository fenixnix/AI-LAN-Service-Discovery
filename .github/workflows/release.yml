name: Release

on:
  push:
    tags:
      - v*.*.*

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, x86_64-pc-windows-msvc, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Create release directory
        run: mkdir -p release/${{ matrix.target }}

      - name: Copy binary
        run: |
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp target/${{ matrix.target }}/release/aidis.exe release/${{ matrix.target }}/
          else
            cp target/${{ matrix.target }}/release/aidis release/${{ matrix.target }}/
          fi

      - name: Copy skills directory
        run: cp -r .trae/skills release/${{ matrix.target }}/

      - name: Create bin directory in aidis-service-discovery
        run: mkdir -p release/${{ matrix.target }}/.trae/skills/aidis-service-discovery/bin

      - name: Copy binary to aidis-service-discovery bin directory
        run: |
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp target/${{ matrix.target }}/release/aidis.exe release/${{ matrix.target }}/.trae/skills/aidis-service-discovery/bin/
          else
            cp target/${{ matrix.target }}/release/aidis release/${{ matrix.target }}/.trae/skills/aidis-service-discovery/bin/
          fi

      - name: Create archive
        run: |
          cd release
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            zip -r aidis-${{ matrix.target }}.zip ${{ matrix.target }}
          else
            tar -czf aidis-${{ matrix.target }}.tar.gz ${{ matrix.target }}
          fi

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: release/aidis-${{ matrix.target }}.${{ matrix.target == 'x86_64-pc-windows-msvc' ? 'zip' : 'tar.gz' }}
          asset_name: aidis-${{ matrix.target }}.${{ matrix.target == 'x86_64-pc-windows-msvc' ? 'zip' : 'tar.gz' }}
          asset_content_type: ${{ matrix.target == 'x86_64-pc-windows-msvc' ? 'application/zip' : 'application/gzip' }}

  create-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
